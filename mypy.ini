[mypy]
python_version = 3.10
# No type stubs for the vendored SDK / PyQt6 / Pillow / pyudev — don't error on them.
ignore_missing_imports = True
# The vendored MIT StreamDock SDK is not ours to type-check.
exclude = fifine_deck/backend/

# First pass is intentionally lenient and runs advisory (non-blocking) in CI.
# Tighten over time (disallow_untyped_defs, then strict) as annotations grow,
# and make the CI step blocking once it's clean.
