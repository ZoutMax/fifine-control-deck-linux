name: fifine-control-deck
base: core24
version: '0.10.1'
icon: snap/gui/fifine-control-deck.png
title: fifine Control Deck
license: MIT
contact: https://github.com/ZoutMax/FifineControlDeck/issues
issues: https://github.com/ZoutMax/FifineControlDeck/issues
source-code: https://github.com/ZoutMax/FifineControlDeck
website: https://zoutmax.github.io/FifineControlDeck/
summary: Control app for fifine / Stream Dock macro keypads
description: |
  A native Linux control application for the fifine Control Deck (a
  Mirabox / Hotspot "Stream Dock" style macro keypad with per-key LCDs).
  Draw icons and labels on the keys and bind them to actions: launch apps,
  hotkeys, media and volume control, scripts, brightness, page/profile
  switching, folders and multi-step macros — with a PyQt6 configuration GUI.

  Website: https://zoutmax.github.io/FifineControlDeck/

  This is the CLASSIC build: the deck is driven over /dev/hidraw, which strict
  confinement cannot grant, so full device control needs classic. Access still
  requires the udev rule 70-fifine-deck.rules on the host (plugdev on VID 3142).

grade: stable
confinement: classic

platforms:
  amd64:
  arm64:

apps:
  fifine-control-deck:
    command: bin/fifine-control-deck-launch

parts:
  fifine-deck:
    plugin: python
    source: .
    python-packages:
      - PyQt6
      - Pillow
      - pyudev
      - keyring
      - psutil
      - pynvml
    stage-packages:
      - libudev1
      # Qt6 xcb platform plugin runtime deps (classic = no gnome platform snap)
      - libxcb-cursor0
      - libxcb-xinerama0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      - libxcb-shape0
      - libxcb-util1
      - libxkbcommon0
      - libxkbcommon-x11-0
      - libgl1
      - libegl1
      - libglx-mesa0
      - libopengl0
      - libfontconfig1
      - libfreetype6
      - libdbus-1-3
      - libnss3
    override-build: |
      set -eux
      # core24's base ships python3.12, so snapcraft PRUNES it from the payload.
      # A classic snap has no base at runtime, so bundle the interpreter + stdlib
      # ourselves BEFORE the plugin runs (files go to usr/, venv uses bin/, so no
      # collision); the plugin's fixup then finds usr/bin/python3.12.
      inst="$CRAFT_PART_INSTALL"
      triplet="${CRAFT_ARCH_TRIPLET_BUILD_FOR:-${CRAFT_ARCH_TRIPLET:-x86_64-linux-gnu}}"
      mkdir -p "$inst/usr/bin" "$inst/usr/lib/$triplet"
      cp -a /usr/bin/python3.12 "$inst/usr/bin/"
      cp -a /usr/lib/python3.12 "$inst/usr/lib/"
      cp -aL /usr/lib/"$triplet"/libpython3.12.so* "$inst/usr/lib/$triplet/" 2>/dev/null || true

      craftctl default

      dest="$inst/lib/fifine-control-deck"
      mkdir -p "$dest"
      cp -r "$CRAFT_PART_SRC/fifine_deck" "$dest/"
      cp -r "$CRAFT_PART_SRC/assets" "$dest/"
      rm -rf "$dest/assets/store"   # listing screenshots/banner — not runtime assets
      # drop non-Linux and other-arch transport binaries to slim the snap
      find "$dest" -type f \( -name '*.dll' -o -name '*.dylib' \) -delete || true
      case "$triplet" in
        x86_64-*)  find "$dest" -name 'libtransport_arm64.so' -delete || true ;;
        aarch64-*) find "$dest" -name 'libtransport.so'       -delete || true ;;
      esac

      # bundle the udev rule so the in-app hint can hand users a copy command
      # (a snap cannot install a udev rule itself)
      mkdir -p "$inst/udev"
      cp "$CRAFT_PART_SRC/packaging/70-fifine-deck.rules" "$inst/udev/"

  launcher:
    plugin: dump
    source: snap/local
